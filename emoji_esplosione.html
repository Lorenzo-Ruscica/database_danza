<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esplosione di Emoji</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Nasconde le scrollbar */
            background-color: #1a1a2e; /* Sfondo scuro per far risaltare le emoji */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="emojiCanvas"></canvas>
    <script>
        const canvas = document.getElementById('emojiCanvas');
        const ctx = canvas.getContext('2d');

        // Imposta il canvas per coprire tutto lo schermo
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const emojis = ['😀', '😂', '😎', '🚀', '🎉', '🍕', '🎈', '👻', '👽', '🦄', '🔥', '✨', '🌍', '🐱‍🏍', '🌮'];
        const particles = [];
        const numParticles = 1000;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 30 + 15; // Dimensione variabile tra 15 e 45
                this.speedX = (Math.random() - 0.5) * 15; // Velocità X casuale
                this.speedY = (Math.random() - 0.5) * 15; // Velocità Y casuale
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Rimbalzo sui bordi
                if (this.x + this.size / 2 > canvas.width || this.x - this.size / 2 < 0) {
                    this.speedX = -this.speedX;
                }
                if (this.y + this.size / 2 > canvas.height || this.y - this.size / 2 < 0) {
                    this.speedY = -this.speedY;
                }
            }

            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        // Inizializza le emoji
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        // Loop di animazione
        function animate() {
            // Pulisce il frame precedente
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Aggiorna e disegna ogni emoji
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            
            requestAnimationFrame(animate);
        }

        animate();

        // Adatta il canvas se la finestra viene ridimensionata
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
